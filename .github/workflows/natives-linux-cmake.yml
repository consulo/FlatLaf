# Build Linux natives for all supported architectures using the single
# CMakeLists.txt under flatlaf-natives/flatlaf-natives-linux/.
#
# The canonical Gradle build in natives.yml still runs for x86_64/arm64 on
# native GitHub runners; this workflow is independent and also produces x86,
# riscv64 and loongarch64 which Gradle's cpp-library plugin cannot build.

name: Native Libraries (Linux, CMake)

on:
    push:
        branches:
            - '*'
        tags:
            - '[0-9]*'
        paths:
            - 'flatlaf-natives/flatlaf-natives-linux/**'
            - '.github/workflows/natives-linux-cmake.yml'
            - '!**.md'
            - '!**/.settings/**'
    workflow_dispatch:

jobs:
    Natives-Linux:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - arch: x86_64
                      dpkg_arch: amd64
                      triplet: x86_64-linux-gnu
                      image: debian:trixie
                    - arch: x86
                      dpkg_arch: i386
                      triplet: i386-linux-gnu
                      image: debian:trixie
                    - arch: arm64
                      dpkg_arch: arm64
                      triplet: aarch64-linux-gnu
                      image: debian:trixie
                    - arch: riscv64
                      dpkg_arch: riscv64
                      triplet: riscv64-linux-gnu
                      image: debian:trixie
                    # loong64 packages come from debian-ports and are built
                    # against gcc-15. Using trixie amd64 (gcc-14) creates a
                    # Multi-Arch: same version conflict on libgcc-s1 etc., so
                    # this job runs on sid, where amd64 also uses gcc-15.
                    - arch: loongarch64
                      dpkg_arch: loong64
                      triplet: loongarch64-linux-gnu
                      image: debian:sid

        runs-on: ubuntu-latest
        container:
            image: ${{ matrix.image }}

        steps:
            - uses: actions/checkout@v4

            # Run BEFORE any apt-get install so later steps pull matching
            # versions. Only loong64 needs special handling today: sid's
            # amd64 has moved to gcc-16 while debian-ports' loong64 is still
            # on gcc-15, producing a Multi-Arch: same version conflict on
            # libgcc-s1. Pin both archives to a snapshot from before the
            # gcc-16 transition (2026-04-23) so versions match.
            - name: Setup apt sources
              run: |
                if [ "${{ matrix.dpkg_arch }}" != "loong64" ]; then
                    exit 0
                fi

                # The gcc-16 transition hit sid in March 2026 (gcc-16-base
                # around 2026-03-08, libgcc-s1 on 2026-03-22). Pick a snapshot
                # well before that so sid amd64 is still on gcc-15, matching
                # debian-ports' loong64 libgcc-s1=15.2.0-12. If this date ever
                # stops working (e.g. the snapshot expires or the debian-ports
                # baseline moves forward), bump the SNAPSHOT to a date where
                # sid amd64 libgcc-s1 version matches the loong64 one.
                SNAPSHOT=20260115T000000Z
                echo 'Acquire::Check-Valid-Until "false";' \
                    > /etc/apt/apt.conf.d/99no-check-valid

                rm -f /etc/apt/sources.list
                rm -f /etc/apt/sources.list.d/*.sources
                rm -f /etc/apt/sources.list.d/*.list

                cat > /etc/apt/sources.list.d/sid.sources <<EOF
                Types: deb
                URIs: http://snapshot.debian.org/archive/debian/${SNAPSHOT}/
                Suites: sid
                Components: main
                Architectures: amd64
                Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg
                EOF

                apt-get update
                apt-get install -y --no-install-recommends debian-ports-archive-keyring

                cat > /etc/apt/sources.list.d/debian-ports.sources <<EOF
                Types: deb
                URIs: http://snapshot.debian.org/archive/debian-ports/${SNAPSHOT}/
                Suites: sid
                Components: main
                Architectures: loong64
                Signed-By: /usr/share/keyrings/debian-ports-archive-keyring.gpg
                EOF

            - name: Install base build tools
              run: |
                apt-get update
                # openjdk-21-jdk (not -headless) is required for jawt.h,
                # which the -headless variant strips along with AWT/Swing.
                apt-get install -y --no-install-recommends \
                    ca-certificates cmake make pkg-config \
                    openjdk-21-jdk

            - name: Install compiler for ${{ matrix.arch }}
              run: |
                case "${{ matrix.arch }}" in
                    x86_64) apt-get install -y --no-install-recommends g++ ;;
                    x86)    apt-get install -y --no-install-recommends g++-multilib ;;
                    arm64)  apt-get install -y --no-install-recommends g++-aarch64-linux-gnu ;;
                    riscv64) apt-get install -y --no-install-recommends g++-riscv64-linux-gnu ;;
                    loongarch64) apt-get install -y --no-install-recommends g++-loongarch64-linux-gnu ;;
                esac

            - name: Enable ${{ matrix.dpkg_arch }} foreign architecture (if needed)
              run: |
                if [ "${{ matrix.dpkg_arch }}" = "amd64" ]; then
                    exit 0
                fi
                dpkg --add-architecture ${{ matrix.dpkg_arch }}
                apt-get update

            - name: Install target-arch GTK
              run: |
                apt-get install -y --no-install-recommends \
                    libgtk-3-dev:${{ matrix.dpkg_arch }}

            # For most arches the foreign-arch openjdk-21-jre installs cleanly
            # alongside the amd64 JDK. For loong64 that fails because
            # debian-ports lags the sid openjdk version (21.0.9 vs 21.0.11~9ea)
            # and the two packages Break each other. Workaround: download the
            # .deb without installing it (no dep resolution) and extract only
            # the lib/ directory that contains libjawt.so.
            - name: Obtain target-arch libjawt.so
              run: |
                if [ "${{ matrix.dpkg_arch }}" = "amd64" ]; then
                    # host JDK already installed; libjawt.so ships with it
                    echo "JAWT_LIB_DIR=/usr/lib/jvm/java-21-openjdk-amd64/lib" >> $GITHUB_ENV
                    exit 0
                fi

                if [ "${{ matrix.dpkg_arch }}" = "loong64" ]; then
                    mkdir -p /tmp/jre-extract
                    cd /tmp/jre-extract
                    apt-get download openjdk-21-jre:${{ matrix.dpkg_arch }}
                    dpkg-deb -x openjdk-21-jre_*.deb .
                    TARGET_JRE_LIB=$(find . -type d -path '*/jvm/*/lib' -print -quit)
                    if [ -z "$TARGET_JRE_LIB" ]; then
                        echo "::error::Could not locate extracted JRE lib/ directory"
                        find . -name libjawt.so -print
                        exit 1
                    fi
                    ABS_LIB=$(readlink -f "$TARGET_JRE_LIB")
                    if [ ! -f "$ABS_LIB/libjawt.so" ]; then
                        echo "::error::libjawt.so not found in extracted JRE ($ABS_LIB)"
                        exit 1
                    fi
                    echo "JAWT_LIB_DIR=$ABS_LIB" >> $GITHUB_ENV
                else
                    # regular foreign arches: install normally
                    apt-get install -y --no-install-recommends \
                        openjdk-21-jre:${{ matrix.dpkg_arch }}
                    echo "JAWT_LIB_DIR=/usr/lib/jvm/java-21-openjdk-${{ matrix.dpkg_arch }}/lib" >> $GITHUB_ENV
                fi

            - name: Resolve JAVA_HOME
              run: |
                echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which javac))))" >> $GITHUB_ENV

            - name: Configure CMake
              working-directory: flatlaf-natives/flatlaf-natives-linux
              run: |
                cmake -S . -B build/${{ matrix.arch }} \
                    -DCMAKE_BUILD_TYPE=Release \
                    -DFLATLAF_ARCH=${{ matrix.arch }} \
                    -DJAVA_HOME=$JAVA_HOME \
                    -DJAWT_LIB_DIR=$JAWT_LIB_DIR \
                    -DOUTPUT_DIR=$GITHUB_WORKSPACE/flatlaf-core/src/main/resources/com/formdev/flatlaf/natives

            - name: Build
              working-directory: flatlaf-natives/flatlaf-natives-linux
              run: cmake --build build/${{ matrix.arch }} --parallel

            # Catches silent toolchain misconfiguration where the build
            # succeeds but the resulting ELF targets the wrong machine.
            - name: Verify ELF architecture
              run: |
                SO="$GITHUB_WORKSPACE/flatlaf-core/src/main/resources/com/formdev/flatlaf/natives/libflatlaf-linux-${{ matrix.arch }}.so"
                case "${{ matrix.arch }}" in
                    x86_64)      EXPECT="Advanced Micro Devices X86-64" ;;
                    x86)         EXPECT="Intel 80386" ;;
                    arm64)       EXPECT="AArch64" ;;
                    riscv64)     EXPECT="RISC-V" ;;
                    loongarch64) EXPECT="LoongArch" ;;
                esac

                echo "File: $SO"
                readelf -h "$SO" | grep -E "Class|Machine"
                echo
                MACHINE=$(readelf -h "$SO" | awk -F: '/Machine:/ {sub(/^[ \t]+/,"",$2); print $2}')
                if [ "$MACHINE" != "$EXPECT" ]; then
                    echo "::error::ELF machine mismatch. Expected '$EXPECT' for ${{ matrix.arch }}, got '$MACHINE'."
                    exit 1
                fi
                echo "OK: ELF machine is '$MACHINE' as expected."

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: FlatLaf-natives-linux-${{ matrix.arch }}
                  path: |
                      flatlaf-core/src/main/resources/com/formdev/flatlaf/natives/libflatlaf-linux-${{ matrix.arch }}.so
                      flatlaf-natives/flatlaf-natives-linux/build/${{ matrix.arch }}
