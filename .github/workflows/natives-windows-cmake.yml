# Build Windows natives for x86, x86_64 and arm64 using the standalone
# CMakeLists.txt under flatlaf-natives/flatlaf-natives-windows/. Each matrix
# entry produces a single-arch DLL; no fat/universal binaries are created.

name: Native Libraries (Windows, CMake)

on:
    push:
        branches:
            - '*'
        tags:
            - '[0-9]*'
        paths:
            - 'flatlaf-natives/flatlaf-natives-windows/**'
            - '.github/workflows/natives-windows-cmake.yml'
            - '!**.md'
            - '!**/.settings/**'
    workflow_dispatch:

jobs:
    Natives-Windows:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - arch: x86
                      runner: windows-latest
                      msvc_arch: x86
                    - arch: x86_64
                      runner: windows-latest
                      msvc_arch: x64
                    # Native arm64 runner — no cross-compile, simpler CRT
                    # resolution and matches the target exactly.
                    - arch: arm64
                      runner: windows-11-arm
                      msvc_arch: arm64

        runs-on: ${{ matrix.runner }}

        steps:
            - uses: actions/checkout@v5

            - name: Setup Java 21
              uses: actions/setup-java@v5
              with:
                  java-version: 21
                  distribution: temurin

            # Ninja + MSVC is more reliable than the Visual Studio CMake
            # generator, which kept producing .vcxproj files that failed to
            # link the C runtime (unresolved __CxxFrameHandler3/4,
            # __std_terminate) regardless of MSVC_RUNTIME_LIBRARY / CMP0091.
            # Ninja calls cl.exe + link.exe directly with the flags CMake
            # computes, so /MD actually reaches the compiler.
            - name: Setup MSVC (${{ matrix.msvc_arch }})
              uses: ilammy/msvc-dev-cmd@v1
              with:
                  arch: ${{ matrix.msvc_arch }}

            - name: Configure CMake
              working-directory: flatlaf-natives/flatlaf-natives-windows
              shell: cmd
              run: >
                  cmake -S . -B build/${{ matrix.arch }}
                  -G Ninja
                  -DCMAKE_BUILD_TYPE=Release
                  -DFLATLAF_ARCH=${{ matrix.arch }}
                  -DJAVA_HOME="%JAVA_HOME%"
                  -DOUTPUT_DIR="%GITHUB_WORKSPACE%/flatlaf-core/src/main/resources/com/formdev/flatlaf/natives"

            - name: Build
              working-directory: flatlaf-natives/flatlaf-natives-windows
              shell: cmd
              run: cmake --build build/${{ matrix.arch }} --parallel

            # Catches silent toolchain misconfiguration where the DLL ends up
            # targeting the wrong machine (e.g. x86_64 when we asked for arm64).
            - name: Verify PE machine
              shell: bash
              run: |
                  DLL="$GITHUB_WORKSPACE/flatlaf-core/src/main/resources/com/formdev/flatlaf/natives/flatlaf-windows-${{ matrix.arch }}.dll"
                  case "${{ matrix.arch }}" in
                      x86)    EXPECT="x86" ;;
                      x86_64) EXPECT="x64" ;;
                      arm64)  EXPECT="ARM64" ;;
                  esac

                  echo "File: $DLL"
                  dumpbin //HEADERS "$DLL" | grep -E "machine \(.*\)" | head -1
                  echo
                  # dumpbin /headers prints "machine (...)" with human names.
                  MACHINE=$(dumpbin //HEADERS "$DLL" | grep -E "machine \(.*\)" | head -1 | sed -E 's/.*machine \(([^)]*)\).*/\1/')
                  if [ "$MACHINE" != "$EXPECT" ]; then
                      echo "::error::PE machine mismatch. Expected '$EXPECT' for ${{ matrix.arch }}, got '$MACHINE'."
                      exit 1
                  fi
                  echo "OK: PE machine is '$MACHINE' as expected."

            - name: Upload artifacts
              uses: actions/upload-artifact@v5
              with:
                  name: FlatLaf-natives-windows-${{ matrix.arch }}
                  path: |
                      flatlaf-core/src/main/resources/com/formdev/flatlaf/natives/flatlaf-windows-${{ matrix.arch }}.dll
                      flatlaf-natives/flatlaf-natives-windows/build/${{ matrix.arch }}

    Publish:
        needs: Natives-Windows
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        concurrency:
            group: binaries-publish
            cancel-in-progress: false
        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v5
              with:
                  path: artifacts

            - name: Arrange binaries by os-arch
              run: |
                set -euo pipefail
                for dir in artifacts/*/; do
                    name=$(basename "$dir")
                    arch="${name#FlatLaf-natives-windows-}"
                    target="out/windows-$arch"
                    mkdir -p "$target"
                    find "$dir" -name 'flatlaf-windows-*.dll' -exec cp {} "$target/" \;
                done
                find out -type f

            - name: Verify token is available
              env:
                  CONSULO_BOT_TOKEN: ${{ secrets.CONSULO_BOT_TOKEN }}
              run: |
                if [ -z "${CONSULO_BOT_TOKEN:-}" ]; then
                    echo "ERROR: CONSULO_BOT_TOKEN secret is not set for this job" >&2
                    exit 1
                fi
                echo "Token length: ${#CONSULO_BOT_TOKEN}"

            - name: Commit and push to consulo/binaries
              env:
                  CONSULO_BOT_TOKEN: ${{ secrets.CONSULO_BOT_TOKEN }}
              run: |
                set -euo pipefail
                git clone https://github.com/consulo/binaries.git binaries-repo
                cd binaries-repo
                git checkout master 2>/dev/null || git checkout --orphan master
                git config user.name "consulo Bot"
                git config user.email "consulo.bot@gmail.com"
                git config http.https://github.com/.extraheader "AUTHORIZATION: Bearer ${CONSULO_BOT_TOKEN}"
                cp -r ../out/. .
                git add -A
                if git diff --cached --quiet; then
                    echo "No changes to commit"
                else
                    git commit -m "Update flatlaf windows natives from ${GITHUB_REPOSITORY}@${GITHUB_SHA::7}"
                    git push -u origin master
                fi
