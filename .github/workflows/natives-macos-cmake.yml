# Build macOS natives for arm64 and x86_64 using the standalone CMakeLists.txt
# under flatlaf-natives/flatlaf-natives-macos/. Each matrix entry produces a
# single-arch .dylib — no universal (fat) binaries.
#
# macos-latest is arm64; the x86_64 build cross-compiles via clang's -arch flag
# (CMAKE_OSX_ARCHITECTURES=x86_64). No separate intel runner is required.

name: Native Libraries (macOS, CMake)

on:
    push:
        branches:
            - '*'
        tags:
            - '[0-9]*'
        paths:
            - 'flatlaf-natives/flatlaf-natives-macos/**'
            - '.github/workflows/natives-macos-cmake.yml'
            - '!**.md'
            - '!**/.settings/**'
    workflow_dispatch:

jobs:
    Natives-macOS:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - arch: arm64
                    - arch: x86_64

        runs-on: macos-latest

        steps:
            - uses: actions/checkout@v5

            - name: Setup Java 21
              uses: actions/setup-java@v5
              with:
                  java-version: 21
                  distribution: temurin

            - name: Configure CMake
              working-directory: flatlaf-natives/flatlaf-natives-macos
              run: |
                cmake -S . -B build/${{ matrix.arch }} \
                    -DCMAKE_BUILD_TYPE=Release \
                    -DFLATLAF_ARCH=${{ matrix.arch }} \
                    -DJAVA_HOME="$JAVA_HOME" \
                    -DOUTPUT_DIR="$GITHUB_WORKSPACE/flatlaf-core/src/main/resources/com/formdev/flatlaf/natives"

            - name: Build
              working-directory: flatlaf-natives/flatlaf-natives-macos
              run: cmake --build build/${{ matrix.arch }} --parallel

            # Confirms the Mach-O CPU type matches the requested arch. A
            # universal/fat binary would report multiple archs in lipo output
            # and also fail this check, which is intentional.
            - name: Verify Mach-O architecture
              run: |
                DYLIB="$GITHUB_WORKSPACE/flatlaf-core/src/main/resources/com/formdev/flatlaf/natives/libflatlaf-macos-${{ matrix.arch }}.dylib"
                case "${{ matrix.arch }}" in
                    arm64)  EXPECT="arm64" ;;
                    x86_64) EXPECT="x86_64" ;;
                esac

                echo "File: $DYLIB"
                lipo -archs "$DYLIB"
                echo
                ARCHS=$(lipo -archs "$DYLIB")
                if [ "$ARCHS" != "$EXPECT" ]; then
                    echo "::error::Mach-O arch mismatch. Expected '$EXPECT' for ${{ matrix.arch }}, got '$ARCHS'."
                    exit 1
                fi
                echo "OK: Mach-O arch is '$ARCHS' as expected."

            - name: Upload artifacts
              uses: actions/upload-artifact@v5
              with:
                  name: FlatLaf-natives-macos-${{ matrix.arch }}
                  path: |
                      flatlaf-core/src/main/resources/com/formdev/flatlaf/natives/libflatlaf-macos-${{ matrix.arch }}.dylib
                      flatlaf-natives/flatlaf-natives-macos/build/${{ matrix.arch }}

    Publish:
        needs: Natives-macOS
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        concurrency:
            group: binaries-publish
            cancel-in-progress: false
        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v5
              with:
                  path: artifacts

            - name: Arrange binaries by os-arch
              run: |
                set -euo pipefail
                for dir in artifacts/*/; do
                    name=$(basename "$dir")
                    arch="${name#FlatLaf-natives-macos-}"
                    target="out/macos-$arch"
                    mkdir -p "$target"
                    find "$dir" -name 'libflatlaf-macos-*.dylib' -exec cp {} "$target/" \;
                done
                find out -type f

            - name: Verify token is available
              env:
                  CONSULO_BOT_TOKEN: ${{ secrets.CONSULO_BOT_TOKEN }}
              run: |
                if [ -z "${CONSULO_BOT_TOKEN:-}" ]; then
                    echo "ERROR: CONSULO_BOT_TOKEN secret is not set for this job" >&2
                    exit 1
                fi
                echo "Token length: ${#CONSULO_BOT_TOKEN}"

            - name: Commit and push to consulo/binaries
              env:
                  CONSULO_BOT_TOKEN: ${{ secrets.CONSULO_BOT_TOKEN }}
              run: |
                set -euo pipefail
                git clone https://github.com/consulo/binaries.git binaries-repo
                cd binaries-repo
                git checkout master 2>/dev/null || git checkout --orphan master
                git config user.name "consulo Bot"
                git config user.email "consulo.bot@gmail.com"
                git config http.https://github.com/.extraheader "AUTHORIZATION: Bearer ${CONSULO_BOT_TOKEN}"
                cp -r ../out/. .
                git add -A
                if git diff --cached --quiet; then
                    echo "No changes to commit"
                else
                    git commit -m "Update flatlaf macos natives from ${GITHUB_REPOSITORY}@${GITHUB_SHA::7}"
                    git push -u origin master
                fi
